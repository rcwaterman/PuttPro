<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PuttPro — Mobile</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100svh;
            padding: 1rem;
            gap: 0.8rem;
        }

        h1 { font-size: 1.2rem; letter-spacing: 0.05em; padding-top: 0.25rem; }

        #video {
            width: 100%;
            max-width: 520px;
            border-radius: 8px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
        }
        #video.mirror { transform: scaleX(-1); }

        .controls { display: flex; gap: 0.75rem; }

        button {
            background: #2a2a2a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 0.55rem 1.4rem;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        button:active { background: #3a3a3a; }

        #status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: #999;
        }

        #dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        #dot.green  { background: #4caf50; }
        #dot.yellow { background: #ff9800; }
        #dot.red    { background: #f44336; }

        #fps { font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>
    <h1>PuttPro — Mobile</h1>
    <video id="video" autoplay playsinline muted></video>

    <div class="controls">
        <button id="btnFlip">Flip Camera</button>
    </div>

    <div id="status-bar">
        <div id="dot" class="yellow"></div>
        <span id="statusText">Starting camera...</span>
    </div>
    <div id="fps"></div>

    <script>
        const UPLOAD_TOKEN = {{ token|tojson }};
        const UPLOAD_URL   = '/upload_frame';
        const JPEG_QUALITY = 0.80;
        const MAX_IN_FLIGHT = 2; // concurrent HTTP uploads — pipelines encoding latency with RTT

        const video      = document.getElementById('video');
        const dot        = document.getElementById('dot');
        const statusText = document.getElementById('statusText');
        const fpsEl      = document.getElementById('fps');

        let facingMode = 'environment';
        let stopLoop   = false;
        let errorCount = 0;
        let framesSent = 0;
        let inFlight   = 0;
        let encoding   = false; // one encode at a time; HTTP uploads may overlap

        // FPS counter — updated every second
        setInterval(() => {
            fpsEl.textContent = framesSent > 0 ? `${framesSent} fps sent` : '';
            framesSent = 0;
        }, 1000);

        // ---------------------------------------------------------------------------
        // Off-main-thread JPEG encoder via OffscreenCanvas Worker.
        // Falls back to main-thread canvas.toBlob() on unsupported browsers.
        // ---------------------------------------------------------------------------
        const USE_WORKER = typeof OffscreenCanvas !== 'undefined' && typeof Worker !== 'undefined';
        let encoder = null;
        const pendingEncodes = new Map();
        let encodeId = 0;

        if (USE_WORKER) {
            encoder = new Worker('/static/frame_worker.js');
            encoder.onmessage = ({ data: { id, buffer } }) => {
                const resolve = pendingEncodes.get(id);
                if (resolve) { pendingEncodes.delete(id); resolve(buffer); }
            };
        }

        // Reused fallback canvas (avoids allocating one per frame)
        const fallbackCanvas = document.createElement('canvas');

        async function encodeFrame() {
            if (encoder) {
                // createImageBitmap captures the current video frame efficiently
                // and the bitmap is transferred to the worker (zero-copy).
                const bitmap = await createImageBitmap(video);
                return new Promise((resolve) => {
                    const id = encodeId++;
                    pendingEncodes.set(id, resolve);
                    encoder.postMessage({ id, bitmap, quality: JPEG_QUALITY }, [bitmap]);
                });
            }
            // Fallback: encode on main thread
            fallbackCanvas.width  = video.videoWidth;
            fallbackCanvas.height = video.videoHeight;
            fallbackCanvas.getContext('2d').drawImage(video, 0, 0);
            const blob = await new Promise(r =>
                fallbackCanvas.toBlob(r, 'image/jpeg', JPEG_QUALITY)
            );
            return blob.arrayBuffer();
        }

        async function sendFrame() {
            // One encode in progress at a time; up to MAX_IN_FLIGHT uploads may overlap.
            if (encoding || inFlight >= MAX_IN_FLIGHT || video.readyState < 2) return;

            encoding = true;
            let buffer;
            try {
                buffer = await encodeFrame();
            } finally {
                encoding = false;
            }

            // Fire-and-forget the upload so encoding the next frame can start immediately.
            inFlight++;
            framesSent++;
            fetch(UPLOAD_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'image/jpeg',
                    'X-Upload-Token': UPLOAD_TOKEN,
                },
                body: buffer,
            })
            .then(res => {
                if (res.ok) { errorCount = 0; setStatus('green', 'Streaming'); }
                else { onSendError(`Server ${res.status}`); }
            })
            .catch(() => onSendError('Network error'))
            .finally(() => { inFlight--; });
        }

        function onSendError(msg) {
            errorCount++;
            if (errorCount >= 3) setStatus('red', msg);
        }

        function setStatus(state, text) {
            dot.className = state;
            statusText.textContent = text;
        }

        // ---------------------------------------------------------------------------
        // Frame loop — prefers requestVideoFrameCallback (aligned to the video
        // decoder, more accurate than rAF for camera feeds) with rAF fallback.
        // ---------------------------------------------------------------------------
        function startLoop() {
            stopLoop = false;
            if ('requestVideoFrameCallback' in video) {
                function onVideoFrame() {
                    if (stopLoop) return;
                    sendFrame();
                    video.requestVideoFrameCallback(onVideoFrame);
                }
                video.requestVideoFrameCallback(onVideoFrame);
            } else {
                function rafLoop() {
                    if (stopLoop) return;
                    sendFrame();
                    requestAnimationFrame(rafLoop);
                }
                requestAnimationFrame(rafLoop);
            }
        }

        // ---------------------------------------------------------------------------
        // Camera setup
        // ---------------------------------------------------------------------------
        async function startCamera() {
            stopLoop = true; // stop the previous loop cleanly
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }

            setStatus('yellow', 'Requesting camera access...');

            if (!navigator.mediaDevices?.getUserMedia) {
                setStatus('red', 'Camera API unavailable — must be on HTTPS');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode,
                        width:     { ideal: 1280 },
                        height:    { ideal: 720  },
                        frameRate: { ideal: 60   },
                    },
                    audio: false,
                });
                video.srcObject = stream;
                video.classList.toggle('mirror', facingMode === 'user');
                await new Promise(resolve =>
                    video.addEventListener('loadedmetadata', resolve, { once: true })
                );
                setStatus('green', 'Streaming');
                startLoop();
            } catch (err) {
                setStatus('red', 'Camera error: ' + err.message);
            }
        }

        document.getElementById('btnFlip').addEventListener('click', () => {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        });

        startCamera();
    </script>
</body>
</html>
